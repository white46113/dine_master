Your issue is not VS Code now — this is a GitHub Actions FTP deploy error.

❌ Error from your screenshot
Error: Timeout (control socket)
Failed to connect, are you sure your server works via FTP or FTPS?
👉 Meaning:
GitHub runner cannot connect to your FTP server (Hostinger)

🔍 Common Reasons (Very Important)
1. ❌ Wrong Protocol (MOST COMMON)
Hostinger usually supports:

✅ SFTP (SSH)

❌ FTP may be disabled OR different port

👉 Your action (ftp-deploy) uses FTP, not SFTP.

2. ❌ Wrong Port
FTP → 21

SFTP → 22

3. ❌ Firewall / Passive Mode Issue
GitHub Actions runs on cloud → sometimes FTP blocked

4. ❌ Wrong Credentials
Host

Username

Password

✅ FIX (Recommended – Use SFTP instead of FTP)
Change your GitHub Action
Instead of:

uses: SamKirkland/FTP-Deploy-Action@v4.3.0
👉 Use SFTP-compatible action:

- name: Deploy via SFTP
  uses: appleboy/scp-action@v0.1.4
  with:
    host: ${{ secrets.FTP_SERVER }}
    username: ${{ secrets.FTP_USERNAME }}
    password: ${{ secrets.FTP_PASSWORD }}
    port: 22
    source: "."
    target: "/public_html"
✅ If you STILL want FTP (not recommended)
Update config like:

with:
  server: ${{ secrets.FTP_SERVER }}
  username: ${{ secrets.FTP_USERNAME }}
  password: ${{ secrets.FTP_PASSWORD }}
  port: 21
  protocol: ftps
  passive: true
🔥 Hostinger Specific Fix
Go to:
👉 Hostinger → Hosting → FTP Accounts

Check:

Use FTP Host (not domain sometimes)

Example:

ftp.yoursite.com
Try explicit FTPS

🧪 Quick Test (VERY IMPORTANT)
Before GitHub:

Test connection in FileZilla

If FileZilla fails → GitHub will also fail

💡 Best Practice
✔ Use SFTP (port 22)
✔ More secure
✔ Works reliably with GitHub Actions

🚀 Summary
Error = connection timeout

Cause = FTP not reachable / wrong protocol

Fix = switch to SFTP OR correct FTP config

