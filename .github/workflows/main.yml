That pink highlight you’re seeing is coming from your VS Code theme / Git diff decoration, not an error.

It usually appears after updates when:

Theme changes

Git inline blame / diff is enabled

Or a new extension (like GitLens) changes colors

✅ Fix 1: Change VS Code Theme
Press Ctrl + K then Ctrl + T

Select a different theme like:

Dark+ (default dark)

Default Dark Modern

Monokai

👉 This is the quickest fix.

✅ Fix 2: Disable Git Change Highlight (Pink Background)
That pink block is likely Git change (added/modified line).

Disable it:
Go to Settings (Ctrl + ,)

Search:

diff decorations
Set:

SCM: Diff Decorations → none
OR in settings.json:

"scm.diffDecorations": "none"
✅ Fix 3: GitLens Blame Highlight (if installed)
That popup showing commit (Mulla0811...) = GitLens

To disable:

Go to Settings

Search:

gitlens current line
Turn off:

GitLens › Current Line: Enabled

OR disable extension temporarily.

✅ Fix 4: Customize Color (Advanced)
If you want to keep feature but change color:

Open settings.json:

"workbench.colorCustomizations": {
    "editor.lineHighlightBackground": "#2a2a2a",
    "editorGutter.modifiedBackground": "#888888",
    "editorGutter.addedBackground": "#4CAF50"
}
🔥 Recommendation (Best Setup)
Theme: Default Dark Modern

Disable GitLens line highlight

Keep gutter indicators (they are useful)

If you want, I can:
✔ Give you best VS Code theme for PHP/CodeIgniter
✔ Or remove only pink but keep useful Git highlights 👍


