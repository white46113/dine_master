Your YAML is correct structurally, but the error you got:

Error: Timeout (control socket)
👉 means GitHub cannot connect to Hostinger via FTP

🔥 ROOT PROBLEM (Important)
Hostinger does NOT reliably support plain FTP from GitHub runners
👉 It mostly requires FTPS or SFTP

Your current config:

uses: SamKirkland/FTP-Deploy-Action@v4.3.0
👉 defaults to plain FTP (port 21) → ❌ causes timeout

✅ FIX 1 (Quick – Try FTPS)
Update your step like this:

- name: Sync files to Hostinger via FTP
  uses: SamKirkland/FTP-Deploy-Action@v4.3.0
  with:
    server: ${{ secrets.FTP_SERVER }}
    username: ${{ secrets.FTP_USERNAME }}
    password: ${{ secrets.FTP_PASSWORD }}
    port: 21
    protocol: ftps
    security: loose
    passive: true
    server-dir: /public_html/dine_master/
    local-dir: ./
    exclude: |
      **/.git/**
      **/.git*
      **/.github/**
👉 This solves 80% of Hostinger issues

✅ FIX 2 (BEST – Use SFTP 🔥)
Replace FTP action completely:

- name: Deploy via SFTP
  uses: appleboy/scp-action@v0.1.4
  with:
    host: ${{ secrets.FTP_SERVER }}
    username: ${{ secrets.FTP_USERNAME }}
    password: ${{ secrets.FTP_PASSWORD }}
    port: 22
    source: "."
    target: "/public_html/dine_master/"
👉 Why better:

Works with Hostinger 100%

No timeout issues

More secure

🔍 VERY IMPORTANT CHECKS
1. Check Hostinger details
Go to:
👉 Hosting → FTP Accounts

Make sure:

Host = ftp.yourdomain.com OR server IP

NOT just domain sometimes

2. Test in FileZilla (MANDATORY)
Before GitHub:

Try:

Protocol: SFTP OR FTPS

If FileZilla fails → GitHub will fail

3. Firewall Issue (Hidden Problem)
GitHub IPs sometimes blocked on FTP
👉 Another reason SFTP works better

🚀 FINAL RECOMMENDATION
✔ Use SFTP (Fix 2)
✔ Keep Telegram steps (they are fine)
✔ Don’t waste time debugging FTP too much

